databases:
  - name: nightshift-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"

envVarGroups:
  - name: nightshift-shared
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SIGN_IN_URL
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"

services:
  - type: web
    name: nightshift-web
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /
    envVars:
      - fromGroup: nightshift-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString

  - type: worker
    name: nightshift-worker
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - fromGroup: nightshift-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString
