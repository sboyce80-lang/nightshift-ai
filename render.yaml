databases:
  - name: nightshift-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"

envVarGroups:
  - name: nightshift-shared
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SIGN_IN_URL
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_SMTP_SERVER
        value: smtp.gmail.com
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: INTERNAL_NOTIFY_EMAIL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"

services:
  - type: web
    name: nightshift-web
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /
    envVars:
      - fromGroup: nightshift-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString

  # Two dedicated workers — fast queue serves small jobs (<10 pages and
  # all files <30MB) so they aren't stuck behind a 30-min DD-scale takeoff
  # on the heavy queue. Each runs as its own service for memory isolation.
  - type: worker
    name: nightshift-worker-fast
    runtime: python
    plan: standard
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -u worker.py
    envVars:
      - fromGroup: nightshift-shared
      - key: RQ_QUEUE_NAME
        value: nightshift-fast
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString

  - type: worker
    name: nightshift-worker-heavy
    runtime: python
    plan: pro_plus
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -u worker.py
    envVars:
      - fromGroup: nightshift-shared
      - key: RQ_QUEUE_NAME
        value: nightshift-heavy
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString

  # Stuck-job watchdog — every 10 minutes, sweeps any Submission in
  # queued / processing / running state whose updated_at is older than
  # --threshold-min (30) and marks it 'failed' with an explanatory
  # error. Customers get a Resend notification telling them to resubmit
  # instead of staring at a silent UI. Catches the failure mode that
  # took 5h 29m to notice on 2026-05-29 (submission 45c7eca6, killed
  # mid-job by a deploy, sat in 'processing' forever).
  #
  # Cheap to run — single DB query + 0..N updates per tick. Idempotent
  # (a swept job stays 'failed', won't be re-emailed). The --threshold
  # is the longest-legitimate processing window we've observed plus
  # margin; bump to 45 or 60 if long-running multi-PDF batches start
  # tripping false positives.
  - type: cron
    name: nightshift-stuck-job-watchdog
    runtime: python
    region: oregon
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/sweep_stuck_jobs.py --threshold-min 30
    envVars:
      - fromGroup: nightshift-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString
