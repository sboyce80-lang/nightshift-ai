databases:
  - name: nightshift-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"

envVarGroups:
  - name: nightshift-shared
    envVars:
      - key: REDIS_URL
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SIGN_IN_URL
        sync: false
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_SMTP_SERVER
        value: smtp.gmail.com
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: INTERNAL_NOTIFY_EMAIL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"

services:
  - type: web
    name: nightshift-web
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /
    envVars:
      - fromGroup: nightshift-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString

  # Two dedicated workers — fast queue serves small jobs (<10 pages and
  # all files <30MB) so they aren't stuck behind a 30-min DD-scale takeoff
  # on the heavy queue. Each runs as its own service for memory isolation.
  - type: worker
    name: nightshift-worker-fast
    runtime: python
    plan: standard
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -u worker.py
    envVars:
      - fromGroup: nightshift-shared
      - key: RQ_QUEUE_NAME
        value: nightshift-fast
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString

  - type: worker
    name: nightshift-worker-heavy
    runtime: python
    plan: pro_plus
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -u worker.py
    envVars:
      - fromGroup: nightshift-shared
      - key: RQ_QUEUE_NAME
        value: nightshift-heavy
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString

  # Stuck-job watchdog v2 — every 10 minutes. Reaps a Submission ONLY
  # when BOTH liveness signals are dead: the worker heartbeat
  # (submissions.heartbeat_at, touched every ~60s while processing) is
  # stale AND RQ no longer reports the job active. Never reaps on
  # wall-clock age alone — v1 did, was never deployed, and would have
  # killed healthy 90-minute DD-scale jobs at minute 31 and emailed
  # customers "resubmit" while the estimate was still coming.
  # Catches the failure mode that took 5h29m to notice on 2026-05-29
  # (submission 45c7eca6, killed mid-job by a deploy).
  #
  # REQUIRES alembic 0022 (heartbeat_at column) + the heartbeat-enabled
  # worker build. Safe against older rows: legacy rows with no heartbeat
  # need 2h of idle age AND an inactive RQ job before reaping.
  # Cheap — one DB scan + one RQ lookup per candidate. Idempotent.
  - type: cron
    name: nightshift-stuck-job-watchdog
    runtime: python
    region: oregon
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/sweep_stuck_jobs.py --hb-stale-min 10 --queued-grace-min 30
    envVars:
      - fromGroup: nightshift-shared
      - key: DATABASE_URL
        fromDatabase:
          name: nightshift-db
          property: connectionString
