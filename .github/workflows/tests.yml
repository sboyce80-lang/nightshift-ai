name: tests

# Runs the OFFLINE test suites on every push and PR. These are deterministic,
# no API key / network required. The live golden regression (run_analysis ->
# Claude API) is NOT run here — it needs credentials + spend and is run
# manually as the pre-merge accuracy gate.

on:
  push:
  pull_request:

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run offline test suites
        # Auto-discover every test_*.py at the repo root — a hardcoded list let
        # 13 committed suites (door-schedule scope, Beloit fixes, ceiling gate,
        # …) silently skip CI, and a red main went unnoticed for two weeks.
        # Every suite is offline/deterministic by convention; a suite that
        # needs credentials must not be named test_*.py at the root.
        run: |
          set -e
          fail=0
          for f in test_*.py; do
            t="${f%.py}"
            echo "::group::$t"
            if python "$f"; then echo "PASS $t"; else echo "FAIL $t"; fail=1; fi
            echo "::endgroup::"
          done
          exit $fail
